<!DOCTYPE html>
<html>
<head>
  <title>DOM Manipulation</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h2>DOM Manipulation Tasks</h2>

<div class="box">
  <h3>Dynamic List</h3>
  <input type="text" id="input1" placeholder="Enter item">
  <button id="btn1">Add Item</button>
  <ul id="ul1"></ul>
</div>

<div class="box">
  <h3>To-Do List</h3>
  <input type="text" id="input2" placeholder="Enter task">
  <button id="btn2">Add Task</button>
  <ul id="ul2"></ul>
</div>

<div class="box">
  <h3>Toggle Button</h3>
  <button id="toggleBtn">Hide</button>

  <div id="toggleArea"></div>
</div>

<script src="script.js"></script>
</body>
</html>
