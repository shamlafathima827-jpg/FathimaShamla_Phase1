<!DOCTYPE html>
<html>
<head>
<title>Glass Profile Card</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: url("https://images.unsplash.com/photo-1503264116251-35a269479413") no-repeat center/cover;
    font-family: Arial, sans-serif;
}

.card {
    width: 300px;
    padding: 20px;
    border-radius: 20px;
    backdrop-filter: blur(10px);
    background: rgba(255, 255, 255, 0.2);
    text-align: center;
    color: white;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
}

.card img {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    border: 3px solid white;
}

.card h2 {
    margin: 10px 0 5px;
}

.card p {
    font-size: 14px;
    opacity: 0.8;
}

.social-icons {
    margin-top: 10px;
}

.social-icons span {
    margin: 0 8px;
    font-size: 20px;
    cursor: pointer;
}

button {
    margin-top: 15px;
    padding: 10px 20px;
    border: none;
    border-radius: 20px;
    background: white;
    color: black;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="card">
    <img src="https://i.pravatar.cc/100" alt="Profile">

    <h2>Your Name</h2>
    <p>Web Developer | Creative Designer</p>

    <div class="social-icons">
        <span>🌐</span>
        <
    </div>

    <button>Follow</button>
</div>

</body>
</html>
