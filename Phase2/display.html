<!DOCTYPE html>
<html>
<head>
<title>Creative Display Demo</title>

<style>

body {
    font-family: Arial, sans-serif;
    background: #f5f5f5;
    text-align: center;
}

h1 {
    color: darkblue;
}

.section {
    margin: 20px;
}

.block-box {
    display: block;
    background: #ffd580;
    padding: 10px;
    margin: 10px auto;
    width: 60%;
}

.inline-text {
    display: inline;
    background: #90ee90;
    padding: 5px;
}

.card {
    display: inline-block;
    width: 140px;
    padding: 10px;
    margin: 5px;
    background: #ffb6c1;
    border-radius: 10px;
}

img {
    display: block;
    width: 180px;
    height: 180px;
    margin: 20px auto;
    border-radius: 10px;
}

</style>
</head>

<body>

<h1>Creative Display Types</h1>

<div class="section">
    <h2>Block Elements</h2>
    <div class="block-box">I take full width</div>
    <div class="block-box">Another block element</div>
</div>

<div class="section">
    <h2>Inline Elements</h2>
    <span class="inline-text">Hello</span>
    <span class="inline-text">World</span>
    <span class="inline-text">Inline Style</span>
</div>

<div class="section">
    <h2>Inline-Block Cards</h2>
    <div class="card">Card 1</div>
    <div class="card">Card 2</div>
    <div class="card">Card 3</div>
</div>

<img src="https://img.freepik.com/premium-photo/modern-desktop-computer-concept-illustration_1029473-452504.jpg">

</body>
</html>
