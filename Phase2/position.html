<!DOCTYPE html>
<html>
<head>
<title>Apple Store </title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f4f6f8;
}

.navbar {
    position: fixed;
    top: 0;
    width: 100%;
    background: #ff3f6c; 
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 26px;
    z-index: 1000;
}

h2 {
    margin-top: 100px;
    text-align: center;
}

.card {
    width: 300px;
    margin: 40px auto;
    background: white;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    text-align: center;
}

.card img {
    width: 100%;
    height: 220px;
    object-fit: contain;
    background: white;
}

.price {
    color: #ff3f6c;
    font-size: 20px;
    font-weight: bold;
}

.btn {
    background: #ff3f6c;
    color: white;
    padding: 10px;
    border: none;
    border-radius: 5px;
    margin-top: 10px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="navbar">SHAMLA STORE</div>

<h2>Best Selling Phones</h2>

<div class="card">
    <img src="https://m.media-amazon.com/images/I/71TPda7cwUL._SX679_.jpg" alt="iPhone with back cover">

    <h3>iPhone 17 Pro Max (Back Cover Included)</h3>
    <p class="price">₹1,59,900</p>
    <button class="btn">Buy Now</button>
</div>

</body>
</html>
