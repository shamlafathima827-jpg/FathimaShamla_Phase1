<!DOCTYPE html>
<html>
<head>
<title>Get in Touch</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #eef2f3;
}

.header {
    background: #4a00e0;
    color: white;
    padding: 15px;
    text-align: center;
}
.wrapper {
    display: flex;
    justify-content: center;
    margin-top: 50px;
}
.info {
    width: 250px;
    padding: 20px;
    background: #222;
    color: white;
    border-radius: 10px 0 0 10px;
}

.info h3 {
    margin-top: 0;
}

.form-area {
    width: 300px;
    padding: 20px;
    background: white;
    border-radius: 0 10px 10px 0;
}

input, textarea {
    width: 100%;
    margin: 10px 0;
    padding: 10px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 10px;
    background: #4a00e0;
    color: white;
    border: none;
}
</style>

</head>

<body>

<div class="header">
    <h2>Contact Page</h2>
</div>

<div class="wrapper">

    <div class="info">
        <h3>Contact Info</h3>
        <p> Location: Kerala</p>
        <p> Phone:000000000</p>
        <p> Email: info@mail.com</p>
    </div>

    <div class="form-area">
        <form>
            <input type="text" placeholder="Enter your name" required>
            <input type="email" placeholder="Enter your email" required>
            <textarea placeholder="Write your message"></textarea>
            <button>Submit</button>
        </form>
    </div>

</div>

</body>
</html>
