<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- PDF Requirement: Viewport meta tag --> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Mini Project</title> 
    <style>
        body {
            margin: 0; 
        }
      
        /* PDF Requirement 1: Responsive navigation bar */ 
        nav {
            background-color: #333;
            padding: 10px;
            display: flex; 
            justify-content: space-between;
            align-items: center; 
        }
      
        nav a {
            color: white; 
            text-decoration: none;
            padding: 10px;
        }
      
        /* PDF Requirement 2: Flexbox layout */
        .contact-container { 
            display: flex; 
            justify-content: center;
            padding: 20px; 
        }
      
        /* PDF Requirement 4: Styled forms */
        form {
            border: 1px solid #333;
            padding: 20px;
            width: 300px;
       } 
      
       input, textarea {
           width: 100%;
           padding: 10px;
           margin: 10px 0;
           border: 1px solid #ccc;
       }
      
       button {
           background-color: #333;
           color: white; padding: 10px 20px;
           border: none;
       }
      
       /* PDF Requirement 3: Media queries */
       @media screen and (max-width: 600px) {
           nav { 
               flex-direction: column;
           } form { 
                 width: 100%;
           }
       }
   </style> 
</head>
<body> 
    <!-- Responsive Navigation Bar --> 
    <nav> 
        <a href="index.html">Home</a>
        <a href="about.html">About</a> 
        <a href="contact.html">Contact</a>
    </nav>
  
    <!-- Flexbox Layout + Styled Forms -->
    <div class="contact-container">
        <form> 
            <h2>Contact Us</h2> 
            <input type="text" placeholder="Name">
            <input type="email" placeholder="Email"> 
            <textarea placeholder="Message"></textarea> 
            <button type="submit">Send</button> 
        </form>
    </div>
</body>
</html>
