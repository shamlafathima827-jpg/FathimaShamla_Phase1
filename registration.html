<!DOCTYPE html>
<html>
<head>
    <title>College Registration</title> 
</head> 
<body>  
    <h1>College Registration Form</h1>
    <form> 
       <label for="name">Name:</label><br>
       <input type="text" id="name" name="name" required><br><br> 
      
       <label for="email">Email:</label><br> 
       <input type="email" id="email" name="email" required><br><br>
       
       <label for="password">Password:</label><br> 
       <input type="password" id="password" name="password" required minlength="8"><br><br> 
       
       <label for="confirm">Confirm Password:</label><br> 
       <input type="password" id="confirm" name="confirm" required minlength="8"><br><br> 
       
       <label>Gender:</label><br> <input type="radio" id="male" name="gender" value="male" required>
       <label for="male">Male</label>
       <input type="radio" id="female" name="gender" value="female" required>
       <label for="female">Female</label><br><br> 
      
       <label>Hobbies:</label><br> 
       <input type="checkbox" id="reading" name="hobbies" value="reading">
       <label for="reading">Reading</label> <input type="checkbox" id="coding" name="hobbies" value="coding"> 
       <label for="coding">Coding</label> <input type="checkbox" id="sports" name="hobbies" value="sports">
       <label for="sports">Sports</label><br><br> 
       <input type="submit" value="Register">

     </form>
</body>
</html>
